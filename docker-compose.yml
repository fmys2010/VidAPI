version: '3.8'

services:
  vidapi:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - vidapi-config:/home/appuser/.config/vidapi
      - vidapi-downloads:/downloads
    environment:
      - VIDEO_DOWNLOADER_ALLOW_INTERNAL_PROXY=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  vidapi-config:
  vidapi-downloads: